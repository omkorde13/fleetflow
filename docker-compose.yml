services:
  # ─────────────────── PostgreSQL ───────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fleetflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fleetflow}
      POSTGRES_USER: ${POSTGRES_USER:-fleetflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fleetflow_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fleetflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fleetflow_net

  # ─────────────────── Redis ───────────────────
  redis:
    image: redis:7-alpine
    container_name: fleetflow_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fleetflow_net

  # ─────────────────── Backend API ───────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleetflow_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-fleetflow}:${POSTGRES_PASSWORD:-fleetflow_secret}@postgres:5432/${POSTGRES_DB:-fleetflow}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/1
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fleetflow_net
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # ─────────────────── Celery Worker ───────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleetflow_celery_worker
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-fleetflow}:${POSTGRES_PASSWORD:-fleetflow_secret}@postgres:5432/${POSTGRES_DB:-fleetflow}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/1
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
    networks:
      - fleetflow_net
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ─────────────────── Celery Beat ───────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleetflow_celery_beat
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-fleetflow}:${POSTGRES_PASSWORD:-fleetflow_secret}@postgres:5432/${POSTGRES_DB:-fleetflow}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/1
    volumes:
      - ./backend:/app
    depends_on:
      - celery_worker
    networks:
      - fleetflow_net
    command: celery -A app.workers.celery_app beat --loglevel=info
    healthcheck:
      disable: true

  # ─────────────────── Frontend ───────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fleetflow_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    networks:
      - fleetflow_net

  # ─────────────────── Nginx Reverse Proxy ───────────────────
  nginx:
    image: nginx:alpine
    container_name: fleetflow_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - fleetflow_net

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  nginx_logs:

networks:
  fleetflow_net:
    driver: bridge
